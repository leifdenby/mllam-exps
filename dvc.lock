schema: '2.0'
stages:
  prepare_dataset_configs:
    cmd: uv run python create_datastore_config.py --train_duration P8W --input_path
      data/base_datastore.yaml --output_path data/datastore.yaml
    deps:
    - path: create_datastore_config.py
      hash: md5
      md5: 62ba0bdad5077b43d4867af1feb85ca8
      size: 1460
    - path: data/base_datastore.yaml
      hash: md5
      md5: 63971f1cf62762f87451d2c5e4d92c2d
      size: 2882
    outs:
    - path: data/datastore.yaml
      hash: md5
      md5: 71c8edb35d999476e8798aec6bd42d1f
      size: 2297
  prepare_dataset:
    cmd: uv run python -m mllam_data_prep data/datastore.yaml --output data/datastore.zarr  --dask-distributed-local-core-fraction
      0.2
    deps:
    - path: data/datastore.yaml
      hash: md5
      md5: 71c8edb35d999476e8798aec6bd42d1f
      size: 2297
    outs:
    - path: data/datastore.zarr
      hash: md5
      md5: 895e96a0ec666bdc454697c077942850.dir
      size: 16579619131
      nfiles: 6371
  print_dataset_info:
    cmd: uv run zarrdump data/datastore.zarr
  save_env_vars:
    cmd: env > env_vars.txt
    outs:
    - path: env_vars.txt
      hash: md5
      md5: b11345f91f22b13d617b08e395f64270
      size: 6490
  create_graph-slurm:
    cmd: uv run python -m neural_lam.create_graph --config_path data/config.yaml --name
      1level --levels 1
    deps:
    - path: data/datastore.zarr
      hash: md5
      md5: 895e96a0ec666bdc454697c077942850.dir
      size: 16579619131
      nfiles: 6371
    params:
      data/config.yaml:
        datastore:
          kind: mdp
          config_path: ../data/datastore.yaml
    outs:
    - path: data/graph/
      hash: md5
      md5: a6bf314ff9b02c58e05daee9aa9f9e94.dir
      size: 90190870
      nfiles: 7
  create_graph:
    cmd: uv run python -m neural_lam.create_graph --config_path data/config.yaml --name
      1level --levels 1
    deps:
    - path: data/datastore.zarr
      hash: md5
      md5: 895e96a0ec666bdc454697c077942850.dir
      size: 16579619131
      nfiles: 6371
    params:
      data/config.yaml:
        datastore:
          kind: mdp
          config_path: ../data/datastore.yaml
    outs:
    - path: data/graph/
      hash: md5
      md5: a6bf314ff9b02c58e05daee9aa9f9e94.dir
      size: 90190870
      nfiles: 7
