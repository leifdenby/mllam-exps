schema: '2.0'
stages:
  prepare_dataset_configs:
    cmd: uv run python create_datastore_config.py --train_duration P2W --input_path
      data/base_datastore.yaml --output_path data/datastore.yaml
    deps:
    - path: create_datastore_config.py
      hash: md5
      md5: 62ba0bdad5077b43d4867af1feb85ca8
      size: 1460
    - path: data/base_datastore.yaml
      hash: md5
      md5: 63971f1cf62762f87451d2c5e4d92c2d
      size: 2882
    outs:
    - path: data/datastore.yaml
      hash: md5
      md5: 25250b1fc3c69288941a6aa75a7aad41
      size: 2297
  prepare_dataset:
    cmd: uv run python -m mllam_data_prep data/datastore.yaml --output data/datastore.zarr  --dask-distributed-local-core-fraction
      0.2
    deps:
    - path: data/datastore.yaml
      hash: md5
      md5: 25250b1fc3c69288941a6aa75a7aad41
      size: 2297
    outs:
    - path: data/datastore.zarr
      hash: md5
      md5: 978cf3091315ee5e6afed30c26226cbb.dir
      size: 15703721673
      nfiles: 6035
  print_dataset_info:
    cmd: uv run zarrdump data/datastore.zarr
